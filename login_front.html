<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classroom Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b1120;
  position: relative;
  overflow: hidden;
}

/* Soft gradient glow */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #2563eb33, transparent 70%);
  top: -150px;
  left: -150px;
}

body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #06b6d433, transparent 70%);
  bottom: -150px;
  right: -150px;
}

/* Card */
.container {
  position: relative;
  background: rgba(17, 24, 39, 0.75);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 18px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Title */
h2 {
  color: #f9fafb;
  margin-bottom: 30px;
  font-weight: 500;
}

/* Inputs */
.input-box {
  margin-bottom: 18px;
}

.input-box input,
.input-box select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #020617;
  color: #e5e7eb;
  outline: none;
  transition: all 0.25s ease;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.25);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.25s ease;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(59,130,246,0.4);
}

/* Toggle */
.toggle {
  margin-top: 20px;
  font-size: 14px;
  color: #9ca3af;
}

.toggle span {
  color: #38bdf8;
  cursor: pointer;
  margin-left: 5px;
  font-weight: 500;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="title">Login</h2>

  <form onsubmit="handleSubmit(event)">
    
    <div class="input-box">
      <input type="text" required id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
      <input type="text" required id="enrollment" placeholder="Enrollment Number">
    </div>

    <div class="input-box">
      <select id="batch" required>
        <option value="" disabled selected>Select Batch</option>
        <option value="IT1">IT1</option>
        <option value="IT2">IT2</option>
        <option value="AIML">AIML</option>
      </select>
    </div>

    <div id="extraFields" class="hidden">
      <div class="input-box">
        <input type="email" placeholder="Email">
      </div>
    </div>

    <button type="submit" id="submitBtn">Login</button>
  </form>

  <div class="toggle">
    <span id="toggleText">Don't have an account?</span>
    <span onclick="toggleMode()" id="toggleBtn">Sign Up</span>
  </div>
</div>

<script>
let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Create Account";
  document.getElementById("submitBtn").innerText = isLogin ? "Login" : "Sign Up";
  document.getElementById("extraFields").classList.toggle("hidden");

  document.getElementById("toggleText").innerText = isLogin 
    ? "Don't have an account?" 
    : "Already have an account?";

  document.getElementById("toggleBtn").innerText = isLogin ? "Sign Up" : "Login";
}

function handleSubmit(e) {
  e.preventDefault();
  const name = document.getElementById("name").value;
  const batch = document.getElementById("batch").value;

  alert(`Welcome ${name} 🚀\nBatch: ${batch}`);
}
</script>

</body>
</html>
